<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AN TIGH SEINNSE 29th Anniversary</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <!-- HTMLのhead内にこれを書く -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
    <h1>AN TIGH SEINNSE 29th Anniversary</h1>

    <div class="guide-container">
        <h2>💡 ARモードでの操作方法（iPhone / iPad）</h2>
        <div class="guide-grid">
            <div class="guide-item">
                <span class="icon">👆</span>
                <p><strong>1本指でドラッグ</strong><br>場所を移動</p>
            </div>
            <div class="guide-item">
                <span class="icon">✌️</span>
                <p><strong>2本指でひねる</strong><br>モデルを回転</p>
            </div>
            <div class="guide-item">
                <span class="icon">✌️</span>
                <p><strong>２本指でピンチイン / アウト</strong><br>拡大・縮小</p>
            </div>
        </div>
    </div>

    <!-- 3Dモデル -->
    <!-- ar-modes の順番を入れ替え、scene-viewer を先頭（最優先）にする -->
<model-viewer 
    src="images/Antighseinse_29th_AR.glb" 
    ios-src="images/Antighseinse_29th_AR.usdz"
    ar ar-modes="scene-viewer webxr quick-look"
    orientation="0deg 0deg 180deg"
    auto-rotate camera-controls 
    loading="eager">
    <div slot="poster" style="display: flex; justify-content: center; align-items: center; height: 100%;">
        <p style="color: #ffffff;">3Dモデルを読み込み中...</p>
    </div>
</model-viewer>

     <footer>
        <p>&copy; 2026 3i.野村貫太郎事務所</p>
    </footer>

</body>
</html>
